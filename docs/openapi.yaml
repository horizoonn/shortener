openapi: 3.1.0
info:
  title: Shortener API
  version: 0.1.0
servers:
  - url: http://localhost:8080
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ok
  /readyz:
    get:
      summary: Readiness check
      responses:
        "200":
          description: Service dependencies are ready
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                properties:
                  status:
                    type: string
                    example: ready
        "503":
          description: Service dependencies are not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/shorten:
    post:
      summary: Create a short URL
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - original_url
              properties:
                original_url:
                  type: string
                  example: https://example.com/some/long/path
                custom_alias:
                  type: string
                  nullable: true
                  example: my-link
      responses:
        "201":
          description: Short URL created
          content:
            application/json:
              schema:
                type: object
                required:
                  - id
                  - code
                  - original_url
                  - short_url
                  - is_custom
                  - created_at
                properties:
                  id:
                    type: string
                    format: uuid
                  code:
                    type: string
                    example: abc12345
                  original_url:
                    type: string
                    example: https://example.com/some/long/path
                  short_url:
                    type: string
                    example: http://localhost:8080/s/abc12345
                  is_custom:
                    type: boolean
                    example: false
                  created_at:
                    type: string
                    format: date-time
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Short code or custom alias conflict
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /s/{code}:
    get:
      summary: Redirect to the original URL
      description: Resolves a short link, records click analytics best-effort, and redirects to the original URL.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to the original URL
          headers:
            Location:
              description: Original URL
              schema:
                type: string
                format: uri
        "400":
          description: Invalid short code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Short link not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
  /api/v1/analytics/{code}:
    get:
      summary: Get click analytics
      description: Planned endpoint.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
      responses:
        "501":
          description: Not implemented yet
components:
  schemas:
    Error:
      type: object
      required:
        - message
        - code
      properties:
        message:
          type: string
        code:
          type: string
