services:
  postgres:
    image: postgres:17-alpine
    container_name: shortener-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shortener}
      POSTGRES_USER: ${POSTGRES_USER:-shortener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-shortener}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-shortener} -d ${POSTGRES_DB:-shortener}"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    container_name: shortener-redis
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  migrate:
    image: migrate/migrate:v4.19.1
    container_name: shortener-migrate
    volumes:
      - ./migrations:/migrations:ro
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER:-shortener}:${POSTGRES_PASSWORD:-shortener}@postgres:5432/${POSTGRES_DB:-shortener}?sslmode=disable",
        "up"
      ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  shortener:
    build:
      context: .
      dockerfile: cmd/shortener/Dockerfile
    container_name: shortener-api
    env_file:
      - .env
    environment:
      SHORTENER_HTTP_ADDR: ":8080"
      SHORTENER_HTTP_PUBLIC_BASE_URL: http://localhost:${SHORTENER_PORT:-8080}
      SHORTENER_LOG_FOLDER: /app/.out/logs
      SHORTENER_DATABASE_URL: postgres://${POSTGRES_USER:-shortener}:${POSTGRES_PASSWORD:-shortener}@postgres:5432/${POSTGRES_DB:-shortener}?sslmode=disable
      SHORTENER_POSTGRES_TIMEOUT: 5s
      SHORTENER_POSTGRES_MAX_CONNS: 10
      SHORTENER_POSTGRES_MIN_CONNS: 2
      SHORTENER_POSTGRES_MAX_CONN_IDLE_TIME: 5m
      SHORTENER_REDIS_ADDR: redis:6379
      SHORTENER_REDIS_TIMEOUT: 2s
      SHORTENER_REDIS_CACHE_TTL: 10m
      SHORTENER_REDIS_MISS_TTL: 30s
    ports:
      - "${SHORTENER_PORT:-8080}:8080"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
    restart: on-failure

  frontend:
    image: node:20-bookworm-slim
    container_name: shortener-frontend
    working_dir: /app
    command: npm run dev
    environment:
      VITE_API_PROXY_TARGET: http://shortener:8080
    ports:
      - "${WEB_PORT:-5173}:5173"
    volumes:
      - ./web:/app
    depends_on:
      shortener:
        condition: service_started
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:5173').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\""
        ]
      interval: 5s
      timeout: 3s
      retries: 10

  prometheus:
    image: prom/prometheus:v3.7.3
    container_name: shortener-prometheus
    profiles:
      - observability
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-lifecycle"
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    depends_on:
      shortener:
        condition: service_started

  grafana:
    image: grafana/grafana:12.3.0
    container_name: shortener-grafana
    profiles:
      - observability
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      prometheus:
        condition: service_started

volumes:
  postgres-data:
  redis-data:
  prometheus-data:
  grafana-data:
