<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Shortener</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --text: #17202a;
        --muted: #5e6b7a;
        --line: #d9e0e8;
        --accent: #126e82;
        --accent-strong: #0b5566;
        --danger: #b42318;
        --success: #087443;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 32px 0;
      }

      header {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 16px;
        padding: 0 0 24px;
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: 32px;
        line-height: 1.1;
        font-weight: 750;
      }

      .status {
        min-height: 24px;
        color: var(--muted);
        font-size: 14px;
        text-align: right;
      }

      .layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(280px, 360px);
        gap: 24px;
        padding-top: 24px;
      }

      section {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 20px;
      }

      h2 {
        margin: 0 0 16px;
        font-size: 18px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        color: var(--muted);
        font-size: 13px;
        font-weight: 650;
      }

      input {
        width: 100%;
        min-height: 42px;
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 10px 12px;
        color: var(--text);
        font: inherit;
      }

      input:focus {
        border-color: var(--accent);
        outline: 3px solid rgba(18, 110, 130, 0.14);
      }

      .field {
        margin-bottom: 14px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        align-items: center;
      }

      button,
      .button {
        min-height: 40px;
        border: 1px solid var(--accent);
        border-radius: 6px;
        background: var(--accent);
        color: #fff;
        padding: 9px 14px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        cursor: pointer;
      }

      button.secondary,
      .button.secondary {
        background: #fff;
        color: var(--accent-strong);
      }

      button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .result {
        display: none;
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid var(--line);
      }

      .short-url {
        overflow-wrap: anywhere;
        color: var(--accent-strong);
        font-size: 20px;
        font-weight: 750;
      }

      dl {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 10px 14px;
        margin: 0;
      }

      dt {
        color: var(--muted);
        font-size: 13px;
      }

      dd {
        margin: 0;
        overflow-wrap: anywhere;
        font-weight: 650;
      }

      .metric {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 12px;
        padding: 12px 0;
        border-bottom: 1px solid var(--line);
      }

      .metric:last-child {
        border-bottom: 0;
      }

      .metric strong {
        font-size: 26px;
      }

      .error {
        color: var(--danger);
      }

      .success {
        color: var(--success);
      }

      @media (max-width: 760px) {
        main {
          width: min(100% - 20px, 960px);
          padding: 20px 0;
        }

        header,
        .layout {
          display: block;
        }

        .status {
          margin-top: 10px;
          text-align: left;
        }

        section {
          margin-top: 16px;
          padding: 16px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Shortener</h1>
        <div class="status" id="status" aria-live="polite"></div>
      </header>

      <div class="layout">
        <section aria-labelledby="create-title">
          <h2 id="create-title">Create Link</h2>
          <form id="create-form">
            <div class="field">
              <label for="original-url">Original URL</label>
              <input id="original-url" name="original_url" type="url" placeholder="https://example.com/path" required>
            </div>
            <div class="field">
              <label for="custom-alias">Custom Alias</label>
              <input id="custom-alias" name="custom_alias" type="text" inputmode="latin" pattern="[A-Za-z0-9_-]{3,64}" placeholder="release-notes">
            </div>
            <div class="actions">
              <button id="create-submit" type="submit">Create</button>
              <button class="secondary" type="reset">Reset</button>
            </div>
          </form>

          <div class="result" id="result">
            <p class="short-url" id="short-url"></p>
            <div class="actions">
              <button class="secondary" id="copy-button" type="button">Copy</button>
              <a class="button secondary" id="open-link" href="/" target="_blank" rel="noreferrer">Open</a>
            </div>
          </div>
        </section>

        <section aria-labelledby="analytics-title">
          <h2 id="analytics-title">Analytics</h2>
          <form id="analytics-form">
            <div class="field">
              <label for="analytics-code">Code</label>
              <input id="analytics-code" name="code" type="text" pattern="[A-Za-z0-9_-]{3,64}" placeholder="abc12345" required>
            </div>
            <div class="actions">
              <button id="analytics-submit" type="submit">Load</button>
            </div>
          </form>

          <div class="result" id="analytics-result">
            <div class="metric">
              <span>Total Clicks</span>
              <strong id="total-clicks">0</strong>
            </div>
            <dl>
              <dt>Original</dt>
              <dd id="analytics-original"></dd>
              <dt>Top Agent</dt>
              <dd id="top-agent"></dd>
              <dt>Recent</dt>
              <dd id="recent-click"></dd>
            </dl>
          </div>
        </section>
      </div>
    </main>

    <script>
      const statusEl = document.querySelector("#status");
      const createForm = document.querySelector("#create-form");
      const createSubmit = document.querySelector("#create-submit");
      const resultEl = document.querySelector("#result");
      const shortURLEl = document.querySelector("#short-url");
      const openLinkEl = document.querySelector("#open-link");
      const copyButton = document.querySelector("#copy-button");
      const analyticsForm = document.querySelector("#analytics-form");
      const analyticsSubmit = document.querySelector("#analytics-submit");
      const analyticsResult = document.querySelector("#analytics-result");

      let currentShortURL = "";

      function setStatus(message, kind = "") {
        statusEl.textContent = message;
        statusEl.className = `status ${kind}`;
      }

      async function readJSON(response) {
        const data = await response.json().catch(() => ({}));
        if (!response.ok) {
          throw new Error(data.message || `HTTP ${response.status}`);
        }
        return data;
      }

      createForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        createSubmit.disabled = true;
        setStatus("Creating...");

        const formData = new FormData(createForm);
        const payload = {
          original_url: formData.get("original_url").trim()
        };
        const customAlias = formData.get("custom_alias").trim();
        if (customAlias) {
          payload.custom_alias = customAlias;
        }

        try {
          const response = await fetch("/api/v1/shorten", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify(payload)
          });
          const data = await readJSON(response);
          currentShortURL = data.short_url;
          shortURLEl.textContent = data.short_url;
          openLinkEl.href = data.short_url;
          document.querySelector("#analytics-code").value = data.code;
          resultEl.style.display = "block";
          setStatus("Created", "success");
        } catch (error) {
          setStatus(error.message, "error");
        } finally {
          createSubmit.disabled = false;
        }
      });

      copyButton.addEventListener("click", async () => {
        if (!currentShortURL) {
          return;
        }
        await navigator.clipboard.writeText(currentShortURL);
        setStatus("Copied", "success");
      });

      analyticsForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        analyticsSubmit.disabled = true;
        setStatus("Loading...");

        const code = new FormData(analyticsForm).get("code").trim();
        try {
          const response = await fetch(`/api/v1/analytics/${encodeURIComponent(code)}`);
          const data = await readJSON(response);
          document.querySelector("#total-clicks").textContent = data.total_clicks;
          document.querySelector("#analytics-original").textContent = data.original_url;
          document.querySelector("#top-agent").textContent =
            data.clicks_by_user_agent[0]?.user_agent || "none";
          document.querySelector("#recent-click").textContent =
            data.recent_clicks[0]?.clicked_at || "none";
          analyticsResult.style.display = "block";
          setStatus("Loaded", "success");
        } catch (error) {
          setStatus(error.message, "error");
        } finally {
          analyticsSubmit.disabled = false;
        }
      });
    </script>
  </body>
</html>
